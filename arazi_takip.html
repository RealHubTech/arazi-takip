<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arazi & Proje Takip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--surface:#ffffff;--s2:#f5f3ef;--border:#e0dbd3;--border2:#c8c2ba;
  --text:#1a1714;--t2:#6b6560;--t3:#9e9892;
  --green:#2d5a3d;--gl:#e8f2eb;
  --amber:#7a5200;--al:#fdf6e3;
  --blue:#1a3a5c;--bl:#e8f0f8;
  --red:#7a1f1f;--rl:#fdf0f0;
  --purple:#3d2060;--pl:#f0eaf8;
  --brown:#8b4513;--brl:#fdf0e8;
  --r:10px;--rs:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow-x:hidden}

/* TOPBAR */
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:100}
.logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.bar-right{display:flex;gap:8px;align-items:center}

/* CANVAS */
.canvas{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:auto;background:var(--bg)}
.canvas-inner{position:relative;min-width:1600px;min-height:1000px}

/* PROJE KARTI */
.kart{position:absolute;width:220px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:default;user-select:none;transition:box-shadow .15s}
.kart:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.kart.seci{border-color:var(--green);box-shadow:0 0 0 3px var(--gl)}
.kart-handle{padding:8px 12px 6px;cursor:grab;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-radius:var(--r) var(--r) 0 0}
.kart-handle:active{cursor:grabbing}
.kart-drag-icon{font-size:14px;color:var(--t3)}
.kart-body{padding:10px 12px 12px}
.kart-title{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:6px}
.kart-meta{display:flex;flex-direction:column;gap:3px}
.kart-meta-row{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:4px}
.kart-kom{font-size:11px;font-weight:600;color:var(--brown);font-family:'DM Mono',monospace;margin-top:4px}
.kart-actions{display:flex;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-amber{background:var(--al);color:var(--amber)}
.b-blue{background:var(--bl);color:var(--blue)}
.b-purple{background:var(--pl);color:var(--purple)}
.b-green{background:var(--gl);color:var(--green)}
.b-gray{background:var(--s2);color:var(--t2)}
.b-brown{background:var(--brl);color:var(--brown)}
.b-red{background:var(--rl);color:var(--red)}

/* BUTTONS */
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--s2)}
.btn-p{background:var(--green);color:#fff;border-color:var(--green)}
.btn-p:hover{background:#234d34}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-d{color:var(--red);border-color:#f0c0c0}
.btn-d:hover{background:var(--rl)}
.btn-icon{width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;font-size:15px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);width:100%;max-width:660px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.mt{font-size:15px;font-weight:600}
.mb{padding:20px;max-height:75vh;overflow-y:auto}
.mf{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--s2);border-radius:0 0 var(--r) var(--r)}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.fc{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--s2);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);background:#fff}
.field textarea{min-height:68px;resize:vertical}
.sec{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* İMAR */
.imar-box{background:var(--gl);border:1px solid #c8dfcd;border-radius:var(--rs);padding:10px 12px;margin-top:6px}
.ir{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px dashed #d0e4d5}
.ir:last-child{border:none;font-weight:700;padding-top:5px}
.it{background:var(--green);color:#fff;border-radius:var(--rs);padding:10px 12px;margin-top:8px}
.itr{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;opacity:.85}
.itr.big{font-size:13px;font-weight:700;opacity:1;padding-top:5px;border-top:1px solid rgba(255,255,255,.3);margin-top:3px}

/* PARSEL */
.pb{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:11px;margin-bottom:8px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.tkgm{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid #c0392b;border-radius:var(--rs);background:#fff8f7;cursor:pointer;font-size:11px;font-weight:600;color:#c0392b;font-family:'DM Sans',sans-serif}
.add-p{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px;border:1px dashed var(--border2);border-radius:var(--rs);background:none;cursor:pointer;font-size:13px;color:var(--green);width:100%;font-family:'DM Sans',sans-serif;margin-top:2px}
.add-p:hover{background:var(--gl)}

/* KOM */
.kb{background:var(--al);border:1px solid #e8d5b0;border-radius:var(--rs);padding:11px}
.kr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.kr label{font-size:12px;color:var(--amber);font-weight:600;min-width:88px}
.kr input,.kr select{font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 8px;border:1px solid #e0c890;border-radius:var(--rs);background:#fff;color:var(--text);flex:1;outline:none}
.kres{font-size:12px;color:var(--amber);font-weight:600;font-family:'DM Mono',monospace;margin-top:2px}

/* NOTLAR */
.nlist{display:flex;flex-direction:column;gap:5px;margin-top:5px}
.nitem{display:flex;align-items:flex-start;gap:7px;background:var(--s2);border-radius:var(--rs);padding:7px 9px}
.ntext{flex:1;font-size:13px;line-height:1.5}
.ndate{font-size:10px;color:var(--t3);white-space:nowrap;font-family:'DM Mono',monospace}

/* STATS BAR */
.stats{display:flex;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:fixed;top:52px;left:0;right:0;z-index:99;overflow-x:auto;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{display:flex;flex-direction:column;align-items:center;padding:4px 14px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--border);flex-shrink:0}
.sv{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.sl{font-size:10px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.3px}

/* CANVAS adjusted for stats bar */
.canvas{top:90px}

/* GCAL */
.gcal{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid #4285F4;border-radius:var(--rs);background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#4285F4;font-family:'DM Sans',sans-serif}
.gcal:hover{background:#e8f0fe}

/* FOOTER */
.footer{position:fixed;bottom:0;left:0;right:0;height:36px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;z-index:99}
.powered{display:inline-flex;align-items:center;gap:8px;opacity:.5;text-decoration:none}
.powered:hover{opacity:1}
.rhn{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.rhn span{font-weight:300}
.rhs{font-size:9px;color:var(--t3)}

/* SHARE MENU */
.smenu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:300;min-width:185px;overflow:hidden}
.si{display:flex;align-items:center;gap:9px;padding:10px 15px;font-size:13px;cursor:pointer;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;color:var(--text)}
.si:hover{background:var(--s2)}

/* KART RENK ŞERİDİ */
.kart-strip{height:4px;border-radius:var(--r) var(--r) 0 0;margin:-1px -1px 0;transition:background .2s}
.strip-amber{background:linear-gradient(90deg,#f59e0b,#d97706)}
.strip-blue{background:linear-gradient(90deg,#3b82f6,#1d4ed8)}
.strip-purple{background:linear-gradient(90deg,#8b5cf6,#6d28d9)}
.strip-green{background:linear-gradient(90deg,#22c55e,#15803d)}
.strip-gray{background:linear-gradient(90deg,#9ca3af,#6b7280)}
.strip-red{background:linear-gradient(90deg,#ef4444,#b91c1c)}
.strip-brown{background:linear-gradient(90deg,#b45309,#92400e)}
.strip-pink{background:linear-gradient(90deg,#ec4899,#be185d)}
.strip-teal{background:linear-gradient(90deg,#14b8a6,#0f766e)}
.strip-orange{background:linear-gradient(90deg,#f97316,#c2410c)}

/* RENK SEÇİCİ */
.renk-picker{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.rc{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.rc:hover{transform:scale(1.2)}
.rc.aktif{border-color:var(--text);transform:scale(1.15)}

/* ARKA PLAN */
.canvas{background-size:cover;background-position:center;background-repeat:no-repeat}
.bg-overlay{position:absolute;inset:0;background:rgba(240,237,232,0.65);pointer-events:none;z-index:0}
.canvas-inner{position:relative;z-index:1}

/* DURUM GÜNLÜĞÜ */
.gunluk{display:flex;flex-direction:column;gap:0;margin-top:6px;position:relative}
.gunluk::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--border);border-radius:2px}
.gl-item{display:flex;gap:12px;align-items:flex-start;padding:6px 0;position:relative}
.gl-dot{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--surface);flex-shrink:0;margin-top:4px;z-index:1;box-shadow:0 0 0 2px var(--gl)}
.gl-dot.eski{background:var(--t3);box-shadow:0 0 0 2px var(--s2)}
.gl-right{flex:1}
.gl-tarih{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-bottom:2px}
.gl-metin{font-size:13px;line-height:1.5;color:var(--text)}
.gl-sil{font-size:11px;color:var(--t3);cursor:pointer;padding:3px 7px;border-radius:3px;border:1px solid var(--border);background:var(--s2);font-family:'DM Sans',sans-serif;flex-shrink:0;transition:all .15s}
.gl-sil:hover{color:var(--red);background:var(--rl);border-color:#fca5a5}
.gl-ekle{display:flex;flex-direction:column;gap:8px;margin-top:10px;background:var(--s2);border-radius:var(--rs);padding:10px;border:1px solid var(--border)}
.gl-ekle-row{display:flex;gap:8px;align-items:center}
.gl-ekle-row label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.gl-ekle-row input[type=date]{font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:#fff;color:var(--text);outline:none;flex:1;transition:border-color .15s}
.gl-ekle-row input[type=date]:focus{border-color:var(--green)}
.gl-ekle textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);background:#fff;color:var(--text);outline:none;resize:none;min-height:64px;width:100%;transition:border-color .15s}
.gl-ekle textarea:focus{border-color:var(--green)}
.gl-ekle-btn{align-self:flex-end;padding:7px 16px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:background .15s}
.gl-ekle-btn:hover{background:#1a4a2d}
.toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);background:#1a1714;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2)}

@media(max-width:600px){
  .kart{width:180px}
  .fg{grid-template-columns:1fr}
  .fc{grid-column:1}
}
</style>
</head>
<body>

<div class="bar">
  <div class="logo">🏗 Arazi & Proje Takip</div>
  <div class="bar-right">
    <button class="btn btn-sm" onclick="acAyarlar()" title="Arka Plan & Ayarlar">⚙</button>
    <button class="btn btn-sm" onclick="acEtkinlik()">+ Etkinlik</button>
    <button class="btn btn-p btn-sm" onclick="acYeni()">+ Proje</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="canvas"><div class="bg-overlay"></div><div class="canvas-inner" id="masa"></div></div>

<div class="footer">
  <div class="powered">
    <svg width="22" height="22" viewBox="0 0 80 80" fill="none">
      <path d="M40 8L8 32v40h20V48h24v24h20V32L40 8z" fill="url(#g1)"/>
      <rect x="30" y="34" width="20" height="20" rx="4" fill="url(#g2)"/>
      <defs>
        <linearGradient id="g1" x1="8" y1="8" x2="72" y2="72" gradientUnits="userSpaceOnUse"><stop stop-color="#2563EB"/><stop offset="1" stop-color="#1D4ED8"/></linearGradient>
        <linearGradient id="g2" x1="30" y1="34" x2="50" y2="54" gradientUnits="userSpaceOnUse"><stop stop-color="#34D399"/><stop offset="1" stop-color="#059669"/></linearGradient>
      </defs>
    </svg>
    <div><div class="rhn"><span>REAL</span>hub</div><div class="rhs">Realhub Tech Distribution Ltd.</div></div>
  </div>
</div>

<div id="mroot"></div>

<script>
// ── STORAGE ──────────────────────────────────────────────────
const K='rh_projeler', KP='rh_pozisyon', KEV='rh_etkinlik';
function load(){try{return JSON.parse(localStorage.getItem(K)||'[]')}catch{return[]}}
function save(d){localStorage.setItem(K,JSON.stringify(d))}
function loadPos(){try{return JSON.parse(localStorage.getItem(KP)||'{}')}catch{return{}}}
function savePos(d){localStorage.setItem(KP,JSON.stringify(d))}
function loadEv(){try{return JSON.parse(localStorage.getItem(KEV)||'[]')}catch{return[]}}
function saveEv(d){localStorage.setItem(KEV,JSON.stringify(d))}

// ── HELPERS ──────────────────────────────────────────────────
const DB={'Talep':'b-amber','Görüşme':'b-blue','Teklif Verildi':'b-purple','Müzakere':'b-brown','Anlaşıldı':'b-green','Kapandı':'b-gray'};
const TL={insaat_firmasi:'İnşaat Firması',mutahhit:'Müteahhit',araci:'Aracı'};
function fmt(n,b){if(!n)return'—';const v=parseFloat(n);if(b==='USD')return'$'+v.toLocaleString('tr-TR');if(b==='EUR')return'€'+v.toLocaleString('tr-TR');if(b==='m2')return v.toLocaleString('tr-TR')+' m²';return v.toLocaleString('tr-TR')+'₺'}
function n2(v){return parseFloat(v).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function esc(v){return(v||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function today(){return new Date().toISOString().slice(0,10)}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

// ── STATS ────────────────────────────────────────────────────
function renderStats(){
  const d=load();
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="sv">${d.length}</div><div class="sl">Toplam</div></div>
    <div class="stat"><div class="sv" style="color:var(--amber)">${d.filter(p=>p.durum==='Müzakere'||p.durum==='Görüşme').length}</div><div class="sl">Aktif</div></div>
    <div class="stat"><div class="sv" style="color:var(--purple)">${d.filter(p=>p.durum==='Teklif Verildi').length}</div><div class="sl">Teklif</div></div>
    <div class="stat"><div class="sv" style="color:var(--green)">${d.filter(p=>p.durum==='Anlaşıldı').length}</div><div class="sl">Anlaşıldı</div></div>
    <div class="stat"><div class="sv" style="color:var(--blue)">${loadEv().filter(e=>e.tarih===today()).length}</div><div class="sl">Bugün</div></div>`;
}

// ── MASA RENDER ──────────────────────────────────────────────
function renderMasa(){
  renderStats();
  const masa=document.getElementById('masa');
  const data=load();
  const pos=loadPos();
  // clear
  masa.innerHTML='';
  // place cards
  data.forEach((p,i)=>{
    const px=pos[p.id]?pos[p.id].x:40+(i%6)*240;
    const py=pos[p.id]?pos[p.id].y:40+Math.floor(i/6)*200;
    const el=document.createElement('div');
    el.className='kart';
    el.id='kart'+p.id;
    el.style.left=px+'px';
    el.style.top=py+'px';
    const b=DB[p.durum]||'b-gray';
    const kom=parseFloat(p.komisyon_miktar)||0;
    const pay=parseInt(p.paydas_sayisi)||1;
    const stripClass = p.renk_strip || durumStrip(p.durum);
    const sonGunluk = p.gunluk && p.gunluk.length ? p.gunluk[p.gunluk.length-1] : null;
    el.innerHTML=`
      <div class="kart-strip ${stripClass}"></div>
      <div class="kart-handle" id="h${p.id}">
        <span class="kart-drag-icon">⠿</span>
        <div style="display:flex;gap:4px;align-items:center">
          <span class="badge ${b}" style="font-size:9px">${p.durum||'—'}</span>
          <span style="font-size:11px;cursor:pointer;color:var(--t3)" onclick="event.stopPropagation();renkMenu(event,${p.id})" title="Renk değiştir">🎨</span>
        </div>
      </div>
      <div class="kart-body" onclick="kartDetay(${p.id})">
        <div class="kart-title">${p.proje_adi||'İsimsiz'}</div>
        <div class="kart-meta">
          ${p.tip?`<div class="kart-meta-row"><span class="badge b-gray" style="font-size:9px">${TL[p.tip]||''}</span></div>`:''}
          ${p.lokasyon?`<div class="kart-meta-row">📍 ${p.lokasyon}</div>`:''}
          ${p.muhatap_adi?`<div class="kart-meta-row">👤 ${p.muhatap_adi}</div>`:''}
          ${kom?`<div class="kart-kom">💰 ${fmt(kom,p.komisyon_birim||'TL')}${pay>1?' ÷'+pay:''}</div>`:''}
          ${sonGunluk?`<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
            <div style="font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-bottom:2px">📋 ${sonGunluk.tarih}</div>
            <div style="font-size:11px;color:var(--t2);line-height:1.4">${sonGunluk.metin.slice(0,60)}${sonGunluk.metin.length>60?'…':''}</div>
          </div>`:''}
        </div>
        <div class="kart-actions" onclick="event.stopPropagation()">
          <button class="btn btn-sm" style="flex:1" onclick="acDuzenle(${p.id})">Düzenle</button>
          <button class="btn btn-sm" onclick="paylasAc(event,${p.id})">⬆</button>
          <button class="btn btn-sm btn-d" onclick="projeSil(${p.id})">✕</button>
        </div>
      </div>`;
    masa.appendChild(el);
    // Attach drag
    attachDrag(el, document.getElementById('h'+p.id), p.id);
  });
}

// ── RENK ─────────────────────────────────────────────────────
const DURUM_STRIP={
  'Talep':'strip-amber','Görüşme':'strip-blue','Teklif Verildi':'strip-purple',
  'Müzakere':'strip-brown','Anlaşıldı':'strip-green','Kapandı':'strip-gray'
};
const TUM_RENKLER=[
  {cls:'strip-amber',label:'Sarı',bg:'#f59e0b'},
  {cls:'strip-blue',label:'Mavi',bg:'#3b82f6'},

function acAyarlar(){
  const mevcutBg=localStorage.getItem('rh_bg')||'';
  const mevcutOpacity=localStorage.getItem('rh_bg_opacity')||'65';
  showModal(`<div class="modal">
    <div class="mh"><span class="mt">⚙ Arka Plan Ayarları</span><button class="btn btn-icon" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="sec" style="margin-top:0">Arka Plan Görseli</div>
      <div class="field" style="margin-bottom:12px">
        <label>Görsel Yükle (JPG, PNG)</label>
        <input type="file" id="bg-file" accept="image/*" onchange="bgYukle(this)" style="font-size:13px;padding:6px">
      </div>
      ${mevcutBg?`<div style="margin-bottom:12px">
        <img src="${mevcutBg}" style="width:100%;max-height:160px;object-fit:cover;border-radius:var(--rs);border:1px solid var(--border)">
      </div>`:''}
      <div class="field" style="margin-bottom:12px">
        <label>Şeffaflık (Overlay): <span id="opa-val">${mevcutOpacity}%</span></label>
        <input type="range" id="opa-range" min="0" max="90" value="${mevcutOpacity}" oninput="bgOpacity(this.value)" style="width:100%;margin-top:4px">
      </div>
      ${mevcutBg?`<button class="btn btn-sm btn-d" onclick="bgSil()">🗑 Arka planı kaldır</button>`:''}
    </div>
    <div class="mf"><button class="btn" onclick="closeModal()">Kapat</button></div>
  </div>`);
}

function bgYukle(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    localStorage.setItem('rh_bg',e.target.result);
    bgUygula();closeModal();acAyarlar();
  };
  reader.readAsDataURL(file);
}

function bgOpacity(val){
  document.getElementById('opa-val').textContent=val+'%';
  localStorage.setItem('rh_bg_opacity',val);
  bgUygula();
}

function bgSil(){
  localStorage.removeItem('rh_bg');
  bgUygula();closeModal();acAyarlar();
}

function bgUygula(){
  const canvas=document.querySelector('.canvas');
  const overlay=document.querySelector('.bg-overlay');
  const bg=localStorage.getItem('rh_bg');
  const opa=parseInt(localStorage.getItem('rh_bg_opacity')||'65');
  if(bg){
    canvas.style.backgroundImage=`url(${bg})`;
    if(overlay) overlay.style.background=`rgba(240,237,232,${opa/100})`;
  } else {
    canvas.style.backgroundImage='';
    if(overlay) overlay.style.background='';
  }
}

// ── DRAG ─────────────────────────────────────────────────────
function attachDrag(kart, handle, id){
  handle.addEventListener('mousedown', e=>{
    e.preventDefault();
    const pos=loadPos();
    const startX=e.clientX, startY=e.clientY;
    const ox=parseInt(kart.style.left)||0;
    const oy=parseInt(kart.style.top)||0;
    kart.style.boxShadow='0 8px 24px rgba(0,0,0,.18)';
    kart.style.zIndex='50';
    kart.style.transition='none';

    function move(e){
      const nx=ox+(e.clientX-startX);
      const ny=oy+(e.clientY-startY);
      kart.style.left=Math.max(0,nx)+'px';
      kart.style.top=Math.max(0,ny)+'px';
    }
    function up(e){
      document.removeEventListener('mousemove',move);
      document.removeEventListener('mouseup',up);
      kart.style.boxShadow='';
      kart.style.zIndex='';
      kart.style.transition='';
      const p=loadPos();
      p[id]={x:parseInt(kart.style.left),y:parseInt(kart.style.top)};
      savePos(p);
    }
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
  });
}

function parSil(pid){fp=fp.filter(x=>x.id!==pid);parsRender()}
function pGun(pid,k,v){const p=fp.find(x=>x.id===pid);if(p){p[k]=v;imarTop()}}

function parsRender(){
  const el=document.getElementById('pc');if(!el)return;
  el.innerHTML=fp.map((p,i)=>`
    <div class="pb">
      <div class="ph">
        <span style="font-size:12px;font-weight:600;color:var(--t2)">Parsel ${i+1}${p.ad?' — '+p.ad:''}</span>

          ${fp.length>1?`<button class="btn btn-sm btn-d" onclick="parSil(${p.id})">Kaldır</button>`:''}
        </div>
      </div>
      <div class="fg">
        <div class="field"><label>Parsel Adı</label><input value="${esc(p.ad)}" placeholder="Konut, Ticari…" oninput="pGun(${p.id},'ad',this.value)"></div>

        <div class="field"><label>Brüt Alan (m²)</label><input type="number" value="${p.brut_alan||''}" oninput="pGun(${p.id},'brut_alan',this.value)"></div>
        <div class="field"><label>Terk (%)</label><input type="number" value="${p.terk_oran||''}" placeholder="örn: 45" oninput="pGun(${p.id},'terk_oran',this.value)"></div>
        <div class="field"><label>Emsal</label><input type="number" step="0.01" value="${p.kaks||''}" placeholder="örn: 1.80" oninput="pGun(${p.id},'kaks',this.value)"></div>
        <div class="field"><label>Otopark (m²)</label><input type="number" value="${p.otopark||''}" placeholder="elle gir" oninput="pGun(${p.id},'otopark',this.value)"></div>
        <div class="field"><label>H max (m)</label><input type="number" value="${p.hmax||''}" oninput="pGun(${p.id},'hmax',this.value)"></div>
        <div class="field fc"><label>Manuel Sonuç</label><input value="${esc(p.net_hesap)}" placeholder="TKGM'den aldıktan sonra" oninput="pGun(${p.id},'net_hesap',this.value)"></div>
      </div>
      ${parHesap(p)}
    </div>`).join('');
  imarTop();
}

function parHesap(p){
  const b=parseFloat(p.brut_alan)||0;if(!b)return'';
  const t=parseFloat(p.terk_oran)||0, ta=b*t/100, net=b-ta;
  const e=parseFloat(p.kaks)||0, ins=e?net*e:0, bi=ins*1.30, op=parseFloat(p.otopark)||0;
  return `<div class="imar-box" style="margin-top:6px">
    <div class="ir"><span>Brüt</span><span>${n2(b)} m²</span></div>
    ${t?`<div class="ir"><span>Net (terk sonrası)</span><span>${n2(net)} m²</span></div>`:''}
    ${ins?`<div class="ir"><span>İnşaat (${e}×)</span><span>${n2(ins)} m²</span></div>`:''}
    ${bi?`<div class="ir" style="font-weight:700;color:var(--green)"><span>Top. Satılabilir ×1.30</span><span>${n2(bi)} m²</span></div>`:''}
    ${op?`<div class="ir" style="color:var(--blue)"><span>Otopark</span><span>${n2(op)} m²</span></div>`:''}
    ${bi?`<div class="ir"><span>Genel Toplam</span><span>${n2(bi+op)} m²</span></div>`:''}
  </div>`;
}

function imarTop(){
  const el=document.getElementById('it');if(!el)return;
  let tB=0,tN=0,tI=0,tBI=0,tO=0;
  fp.forEach(p=>{const b=parseFloat(p.brut_alan)||0,t=(parseFloat(p.terk_oran)||0)/100,n=b*(1-t),e=parseFloat(p.kaks)||0,ins=e?n*e:0;tB+=b;tN+=n;tI+=ins;tBI+=ins*1.30;tO+=parseFloat(p.otopark)||0;});
  if(!tB||fp.length<2){el.innerHTML='';return}
  el.innerHTML=`<div class="it">
    <div style="font-size:10px;font-weight:600;opacity:.7;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px">Tüm Parseller</div>
    <div class="itr"><span>Brüt</span><span>${n2(tB)} m²</span></div>
    <div class="itr"><span>Net</span><span>${n2(tN)} m²</span></div>
    ${tBI?`<div class="itr"><span>Top. Satılabilir</span><span>${n2(tBI)} m²</span></div>`:''}
    ${tO?`<div class="itr"><span>Otopark</span><span>${n2(tO)} m²</span></div>`:''}
    ${tBI?`<div class="itr big"><span>Genel Toplam</span><span>${n2(tBI+tO)} m²</span></div>`:''}
  </div>`;
}

    muhatap_adi:document.getElementById('fmuh').value,
    telefon:document.getElementById('ftel').value,
    lokasyon:document.getElementById('flok').value,
    imar_durumu:document.getElementById('fimar').value,
    talepler:document.getElementById('ftal').value,
    komisyon_miktar:document.getElementById('fkom').value,
    komisyon_birim:document.getElementById('fbir').value,
    paydas_sayisi:document.getElementById('fpay').value,
    parseller:JSON.parse(JSON.stringify(fp)),
    ada_parsel:fp[0]?fp[0].ada_parsel:'',
    parsel_alani:fp[0]?fp[0].brut_alan:'',
    kaks:fp[0]?fp[0].kaks:'',
  };
  let data=load();
  if(id){const i=data.findIndex(x=>x.id===id);if(i>-1){yeni.id=id;yeni.notlar=data[i].notlar||[];yeni.gunluk=data[i].gunluk||[];data[i]=yeni;}}
  else{yeni.id=Date.now();yeni.notlar=[];yeni.gunluk=[];data.push(yeni);}
  save(data);closeModal();renderMasa();
}

function projeSil(id){
  if(!confirm('Bu projeyi silmek istediğinizden emin misiniz?'))return;
  save(load().filter(p=>p.id!==id));
  const pos=loadPos();delete pos[id];savePos(pos);
  renderMasa();
}

function notSil(pid,idx){
  const d=load(),p=d.find(x=>x.id===pid);
  if(p&&p.notlar)p.notlar.splice(idx,1);
  save(d);closeModal();renderMasa();
}

function notEkle(id){
  const m=prompt('Notu girin:');if(!m)return;
  const d=load(),p=d.find(x=>x.id===id);
  if(p){if(!p.notlar)p.notlar=[];p.notlar.push({m,t:new Date().toLocaleDateString('tr-TR')});}
  save(d);closeModal();renderMasa();
}

function gunlukEkle(id){
  const el=document.getElementById('gl-input-'+id);
  const metin=(el?el.value:'').trim();
  if(!metin)return;
  const d=load(),p=d.find(x=>x.id===id);
  if(p){
    if(!p.gunluk)p.gunluk=[];
    const now=new Date();
    p.gunluk.push({
      metin,
      tarih:now.toLocaleDateString('tr-TR'),
      saat:now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})
    });
    save(d);
    // Refresh modal
    closeModal();
    kartDetay(id);
  }
}

function gunlukSil(pid,idx){
  if(!confirm('Bu kayıt silinsin mi?'))return;
  const d=load(),p=d.find(x=>x.id===pid);
  if(p&&p.gunluk)p.gunluk.splice(idx,1);
  save(d);closeModal();kartDetay(pid);
}

function gcal(id){
  const p=load().find(x=>x.id===id);if(!p)return;
  const t=encodeURIComponent((p.proje_adi||'Proje')+' — Takip');
  const d=encodeURIComponent([p.lokasyon?'Lokasyon: '+p.lokasyon:'',p.muhatap_adi?'Muhatap: '+p.muhatap_adi:''].filter(Boolean).join('\n'));
  const ts=new Date().toISOString().replace(/[-:]/g,'').replace(/\..+/,'')+'Z';
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${t}&details=${d}&dates=${ts}/${ts}`,'_blank');
}

// ── PAYLAŞIM ──────────────────────────────────────────────────
let sm=null;
function paylasAc(e,id){
  e.stopPropagation();
  if(sm){sm.remove();sm=null;}
  const p=load().find(x=>x.id===id);if(!p)return;
  const r=e.target.getBoundingClientRect();
  const m=document.createElement('div');
  m.className='smenu';
  m.style.cssText=`top:${r.bottom+6+scrollY}px;left:${Math.min(r.left,innerWidth-200)}px`;
  m.innerHTML=`
    <button class="si" onclick="wpGonder(${id})">💬 WhatsApp</button>
    <button class="si" onclick="mailGonder(${id})">📧 E-posta</button>
    <button class="si" onclick="kopyala(${id})">📋 Kopyala</button>
    <button class="si" onclick="yazdir(${id})">📄 Yazdır / PDF</button>`;
  document.body.appendChild(m);sm=m;
  setTimeout(()=>document.addEventListener('click',()=>{if(sm){sm.remove();sm=null;}},{once:true}),10);
}
function pMetin(p){const kom=parseFloat(p.komisyon_miktar)||0,pay=parseInt(p.paydas_sayisi)||1;return`🏗 ${p.proje_adi||'Proje'}\n📍 ${p.lokasyon||'—'} | 👤 ${p.muhatap_adi||'—'}\n📋 ${TL[p.tip]||'—'} | ${p.durum||'—'}${kom?'\n💰 '+fmt(kom,p.komisyon_birim||'TL')+(pay>1?' ('+pay+' paydaş → '+fmt(kom/pay,p.komisyon_birim||'TL')+')':''):''}${p.talepler?'\n📝 '+p.talepler:''}\n${new Date().toLocaleDateString('tr-TR')}`}
function wpGonder(id){if(sm){sm.remove();sm=null;}const p=load().find(x=>x.id===id);if(p)window.open('https://wa.me/?text='+encodeURIComponent(pMetin(p)),'_blank')}
function mailGonder(id){if(sm){sm.remove();sm=null;}const p=load().find(x=>x.id===id);if(p)window.open(`mailto:?subject=${encodeURIComponent('Proje: '+(p.proje_adi||''))}&body=${encodeURIComponent(pMetin(p))}`)}
function kopyala(id){if(sm){sm.remove();sm=null;}const p=load().find(x=>x.id===id);if(p)navigator.clipboard.writeText(pMetin(p)).then(()=>toast('Kopyalandı ✓')).catch(()=>alert(pMetin(p)))}
function yazdir(id){if(sm){sm.remove();sm=null;}const p=load().find(x=>x.id===id);if(!p)return;const w=window.open('','_blank');w.document.write(`<html><head><meta charset="UTF-8"><title>${p.proje_adi}</title><style>body{font-family:Arial,sans-serif;padding:32px;max-width:700px;margin:0 auto}h2{margin-bottom:6px}p{color:#666;margin-bottom:20px}table{width:100%;border-collapse:collapse}td{padding:7px 0;border-bottom:1px solid #eee;font-size:14px}td:last-child{text-align:right;font-weight:500}</style></head><body><h2>${p.proje_adi}</h2><p>${new Date().toLocaleDateString('tr-TR')}</p><table><tr><td>Lokasyon</td><td>${p.lokasyon||'—'}</td></tr><tr><td>Muhatap</td><td>${p.muhatap_adi||'—'}</td></tr><tr><td>Durum</td><td>${p.durum||'—'}</td></tr><tr><td>Komisyon</td><td>${p.komisyon_miktar?fmt(p.komisyon_miktar,p.komisyon_birim||'TL'):'—'}</td></tr></table>${p.talepler?`<h3 style="margin:20px 0 8px">Talepler</h3><p>${p.talepler}</p>`:''}</body></html>`);w.document.close();setTimeout(()=>w.print(),300)}

function acEtkinlik(tarih){
  const tv=tarih||today();
  const projeler=load();
  showModal(`<div class="modal">
    <div class="mh"><span class="mt">Etkinlik Ekle</span><button class="btn btn-icon" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="fg">
        <div class="field fc"><label>Başlık</label><input id="evb" placeholder="Toplantı, Gezi…"></div>
        <div class="field"><label>Tarih</label><input id="evt" type="date" value="${tv}"></div>
        <div class="field"><label>Saat</label><input id="evs" type="time" value="10:00"></div>
        <div class="field"><label>İlgili Proje</label><select id="evp">
          <option value="">— Seçin —</option>
          ${projeler.map(p=>`<option value="${esc(p.proje_adi)}">${p.proje_adi||'İsimsiz'}${p.lokasyon?' ('+p.lokasyon+')':''}</option>`).join('')}
        </select></div>
        <div class="field fc"><label>Not</label><textarea id="evn" placeholder="Detay…"></textarea></div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-top:10px;cursor:pointer">

      </label>
    </div>
    <div class="mf"><button class="btn" onclick="closeModal()">İptal</button><button class="btn btn-p" onclick="evKaydet()">Ekle</button></div>
  </div>`);
}

function evKaydet(){
  const b=document.getElementById('evb').value;
  if(!b){alert('Başlık zorunlu!');return}
  const e={id:Date.now().toString(),baslik:b,tarih:document.getElementById('evt').value,saat:document.getElementById('evs').value,proje:document.getElementById('evp').value,not:document.getElementById('evn').value};
  const evs=loadEv();evs.push(e);saveEv(evs);
  if(document.getElementById('evgc').checked){
    const t=encodeURIComponent(b+(e.proje?' — '+e.proje:''));
    const d=e.tarih.replace(/-/g,'')+'T'+e.saat.replace(':','')+'00';
    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${t}&details=${encodeURIComponent(e.not||'')}&dates=${d}/${d}`,'_blank');
  }
  closeModal();renderStats();toast('Etkinlik eklendi ✓');
}
